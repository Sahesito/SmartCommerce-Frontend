<p-toast />
<p-confirmDialog />

<div class="users-page">

    <div class="page-header">
        <div>
            <h1>Users</h1>
            <p>Manage system users</p>
        </div>
        <p-button label="New User" icon="pi pi-plus" (onClick)="openCreate()" />
    </div>

    <div class="search-bar">
        <input pInputText [(ngModel)]="searchTerm" placeholder="Search by name or email..." class="search-input" />
    </div>

    <div class="table-container">
        <p-table [value]="filteredUsers" [loading]="loading" [paginator]="true" [rows]="10"
            [rowsPerPageOptions]="[5, 10, 20]" styleClass="p-datatable-sm" [tableStyle]="{'min-width': '60rem'}">
            <ng-template pTemplate="header">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Phone</th>
                    <th>City</th>
                    <th>State</th>
                    <th>Actions</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-user>
                <tr>
                    <td>{{ user.id }}</td>
                    <td>
                        <div class="user-name">
                            <div class="avatar">
                                {{ user.firstName[0] }}{{ user.lastName[0] }}
                            </div>
                            <span>{{ user.firstName }} {{ user.lastName }}</span>
                        </div>
                    </td>
                    <td>{{ user.email }}</td>
                    <td>
                        <p-tag [value]="getRoleLabel(user.role)" [severity]="getRoleSeverity(user.role)" />
                    </td>
                    <td>{{ user.phone || '—' }}</td>
                    <td>{{ user.city || '—' }}</td>
                    <td>
                        <p-tag [value]="user.active ? 'Active' : 'Inactive'"
                            [severity]="user.active ? 'success' : 'danger'" />
                    </td>
                    <td>
                        <div class="action-buttons">
                            <p-button icon="pi pi-pencil" [text]="true" size="small" pTooltip="Edit"
                                (onClick)="openEdit(user)" />
                            @if (user.active) {
                            <p-button icon="pi pi-ban" [text]="true" severity="danger" size="small"
                                pTooltip="Deactivate" (onClick)="confirmDelete(user)" />
                            } @else {
                            <p-button icon="pi pi-check" [text]="true" severity="success" size="small"
                                pTooltip="Reactivate" (onClick)="reactivate(user)" />
                            }
                        </div>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="8" class="empty-message">
                        No users found
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

</div>

<p-dialog [header]="isEditing ? 'Edit User' : 'New User'" [(visible)]="dialogVisible"
    [style]="{width: '560px'}" [modal]="true">
    <div class="user-form">

        <div class="field-row">
            <div class="field">
                <label>Names *</label>
                <input pInputText [(ngModel)]="userForm.firstName" placeholder="John" class="w-full" />
            </div>
            <div class="field">
                <label>LastNames *</label>
                <input pInputText [(ngModel)]="userForm.lastName" placeholder="Doe" class="w-full" />
            </div>
        </div>

        <div class="field">
            <label>Email *</label>
            <input pInputText [(ngModel)]="userForm.email" placeholder="email@example.com" class="w-full" />
        </div>

        <div class="field-row">
            <div class="field">
                <label>Role</label>
                <p-select [(ngModel)]="userForm.role" [options]="roles" optionLabel="label" optionValue="value"
                    styleClass="w-full" />
            </div>
            <div class="field">
                <label>State</label>
                <p-select [(ngModel)]="userForm.active" [options]="statusOptions" optionLabel="label"
                    optionValue="value" styleClass="w-full" />
            </div>
        </div>

        <div class="field">
            <label>Phone</label>
            <input pInputText [(ngModel)]="userForm.phone" placeholder="+0 999 000 000" class="w-full" />
        </div>

        <div class="field">
            <label>Address</label>
            <input pInputText [(ngModel)]="userForm.address" placeholder="Av. Example 123" class="w-full" />
        </div>

        <div class="field-row">
            <div class="field">
                <label>City</label>
                <input pInputText [(ngModel)]="userForm.city" placeholder="Paris" class="w-full" />
            </div>
            <div class="field">
                <label>Country</label>
                <input pInputText [(ngModel)]="userForm.country" placeholder="France" class="w-full" />
            </div>
        </div>

    </div>

    <ng-template pTemplate="footer">
        <p-button label="Cancel" severity="secondary" [outlined]="true" (onClick)="dialogVisible = false" />
        <p-button [label]="isEditing ? 'Update' : 'Create'" icon="pi pi-check" [loading]="saving"
            (onClick)="saveUser()" />
    </ng-template>
</p-dialog>
