<p-toast />

<div class="login-container">
    <div class="login-left">
        <div class="brand">
            <h1>Smart Commerce</h1>
            <p>Business sales platform</p>
        </div>
    </div>

    <div class="login-right">
        <div class="login-form-wrapper">

            <div class="login-header">
                <h2>Login</h2>
                <p>Enter your credentials to continue</p>
            </div>

            <div class="login-form">

                <div class="field">
                    <label for="email">Email</label>
                    <input pInputText id="email" type="email" [(ngModel)]="loginData.email"
                        placeholder="email@example.com" class="w-full" />
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <p-password id="password" [(ngModel)]="loginData.password" placeholder="••••••••" [feedback]="false"
                        [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
                </div>

                <p-button label="Login" icon="pi pi-sign-in" styleClass="w-full login-btn" [loading]="loading"
                    (onClick)="onLogin()" />

                <p-divider align="center">
                    <span class="divider-text">¿You don't have an account?</span>
                </p-divider>

                <p-button label="Registar" icon="pi pi-user-plus" severity="secondary" [outlined]="true"
                    styleClass="w-full" routerLink="/auth/register" />

            </div>
        </div>
    </div>
</div>
