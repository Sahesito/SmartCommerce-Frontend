<p-toast />
<p-confirmDialog />

<div class="products-page">

    <div class="page-header">
        <div>
            <h1>Products</h1>
            <p>Manage the product catalog</p>
        </div>
        <p-button label="New Product" icon="pi pi-plus" (onClick)="openCreate()" />
    </div>

    <div class="search-bar">
        <input pInputText [(ngModel)]="searchTerm" placeholder="Search by name or category..."
            class="search-input" />
    </div>

    <div class="table-container">
        <p-table [value]="filteredProducts" [loading]="loading" [paginator]="true" [rows]="10"
            [rowsPerPageOptions]="[5, 10, 20]" styleClass="p-datatable-sm" [tableStyle]="{'min-width': '60rem'}">
            <ng-template pTemplate="header">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>State</th>
                    <th>Actions</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-product>
                <tr>
                    <td>{{ product.id }}</td>
                    <td>
                        <div class="product-name">
                            <img [src]="product.imageUrl || 'https://placehold.co/40x40?text=P'" [alt]="product.name"
                                class="product-thumb"
                                (error)="$any($event.target).src='https://placehold.co/40x40?text=P'" />
                            <span>{{ product.name }}</span>
                        </div>
                    </td>
                    <td>
                        <p-tag [value]="product.category" severity="secondary" />
                    </td>
                    <td>S/ {{ product.price | number:'1.2-2' }}</td>
                    <td>
                        <p-tag [value]="product.active ? 'Active' : 'Deactivate'"
                            [severity]="product.active ? 'success' : 'danger'" />
                    </td>
                    <td>
                        <div class="action-buttons">
                            <p-button icon="pi pi-pencil" [text]="true" size="small" pTooltip="Editar"
                                (onClick)="openEdit(product)" />
                            @if (product.active) {
                            <p-button icon="pi pi-ban" [text]="true" severity="danger" size="small"
                                pTooltip="Deactivate" (onClick)="confirmDelete(product)" />
                            } @else {
                            <p-button icon="pi pi-check" [text]="true" severity="success" size="small"
                                pTooltip="Reactivate" (onClick)="reactivate(product)" />
                            }
                        </div>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="6" class="empty-message">
                        No products found
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

</div>

<p-dialog [header]="isEditing ? 'Edit Product' : 'New Product'" [(visible)]="dialogVisible"
    [style]="{width: '540px'}" [modal]="true">
    <div class="product-form">

        <div class="field">
            <label>Name *</label>
            <input pInputText [(ngModel)]="productForm.name" placeholder="Product name" class="w-full" />
        </div>

        <div class="field">
            <label>Description</label>
            <textarea pTextarea [(ngModel)]="productForm.description" placeholder="Product Description" rows="3"
                class="w-full"></textarea>
        </div>

        <div class="field-row">
            <div class="field">
                <label>Price *</label>
                <p-inputnumber [(ngModel)]="productForm.price" mode="decimal" [minFractionDigits]="2"
                    [maxFractionDigits]="2" prefix="$ " styleClass="w-full" />
            </div>
            <div class="field">
                <label>Category *</label>
                <p-select [(ngModel)]="productForm.category" [options]="categories" optionLabel="label"
                    optionValue="value" placeholder="Select" styleClass="w-full" />
            </div>
        </div>

        <div class="field">
            <label>Image URL</label>
            <input pInputText [(ngModel)]="productForm.imageUrl" placeholder="https://..." class="w-full" />
        </div>

        <div class="field">
            <label>State</label>
            <p-select [(ngModel)]="productForm.active" [options]="statusOptions" optionLabel="label" optionValue="value"
                styleClass="w-full" />
        </div>

    </div>

    <ng-template pTemplate="footer">
        <p-button label="Cancel" severity="secondary" [outlined]="true" (onClick)="dialogVisible = false" />
        <p-button [label]="isEditing ? 'Update' : 'Create'" icon="pi pi-check" [loading]="saving"
            (onClick)="saveProduct()" />
    </ng-template>
</p-dialog>
